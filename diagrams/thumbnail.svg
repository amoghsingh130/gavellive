<svg width="1500" height="1000" viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1238"/>
      <stop offset="50%" stop-color="#241653"/>
      <stop offset="100%" stop-color="#0c0a1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="34%" r="46%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#5b3df5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#5b3df5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfc4ff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe7a3"/>
      <stop offset="100%" stop-color="#e9b75a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b81ff"/>
      <stop offset="100%" stop-color="#5b3df5"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1500" height="1000" fill="url(#bg)"/>
  <rect width="1500" height="1000" fill="url(#glow)"/>
  <rect x="28" y="28" width="1444" height="944" rx="34" fill="none" stroke="#e9b75a" stroke-opacity="0.22" stroke-width="2"/>

  <!-- emblem -->
  <g transform="translate(750,375)">
    <circle cx="0" cy="0" r="186" fill="#0c0a1c" fill-opacity="0.35"/>
    <circle cx="0" cy="0" r="186" fill="none" stroke="url(#ring)" stroke-width="6"/>
    <circle cx="0" cy="0" r="208" fill="none" stroke="#e9b75a" stroke-opacity="0.3" stroke-width="2"/>

    <!-- gavel -->
    <g transform="translate(-6,-18)">
      <g transform="rotate(-38)">
        <!-- head -->
        <rect x="-92" y="-44" width="184" height="74" rx="22" fill="url(#gold)"/>
        <!-- bands on head -->
        <rect x="-46" y="-44" width="9" height="74" rx="4" fill="#caa047" fill-opacity="0.55"/>
        <rect x="37" y="-44" width="9" height="74" rx="4" fill="#caa047" fill-opacity="0.55"/>
        <!-- collar -->
        <rect x="-16" y="30" width="32" height="22" rx="7" fill="#f4d692"/>
        <!-- handle -->
        <rect x="-15" y="50" width="30" height="118" rx="15" fill="url(#gold)"/>
        <rect x="-15" y="150" width="30" height="20" rx="10" fill="#caa047"/>
      </g>
    </g>
    <!-- sound block -->
    <rect x="-96" y="150" width="192" height="30" rx="14" fill="url(#gold)"/>
    <rect x="-96" y="150" width="192" height="30" rx="14" fill="#caa047" fill-opacity="0.25"/>
  </g>

  <!-- wordmark -->
  <text x="750" y="710" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="156" font-weight="800" letter-spacing="-3" fill="url(#word)">GavelLive</text>

  <!-- subtitle -->
  <text x="750" y="788" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" letter-spacing="13" font-weight="600" fill="#b9a8ff">LIVE&#160;&#160;LUXURY&#160;&#160;AUCTIONS</text>
</svg>
